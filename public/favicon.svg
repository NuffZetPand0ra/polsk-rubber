<svg width="512" height="512" viewBox="0 0 512 512" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Bridge scoring system</title>
  <desc>PWA favicon for a duplicate bridge scoring system</desc>

  <style>
    .suit-spade { fill: #1a1a2e; }
    .suit-heart { fill: #c0392b; }
    .suit-diamond { fill: #c0392b; }
    .suit-club { fill: #1a1a2e; }
  </style>

  <!-- Outer rim -->
  <circle cx="256" cy="256" r="248" fill="#2c3e50"/>
  <!-- Card background -->
  <circle cx="256" cy="256" r="232" fill="#f5f0e8"/>
  <!-- Thin inner ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#9b8b6e" stroke-width="1"/>

  <!-- Quadrant dividers -->
  <line x1="256" y1="24" x2="256" y2="488" stroke="#c8bda0" stroke-width="1.5"/>
  <line x1="24" y1="256" x2="488" y2="256" stroke="#c8bda0" stroke-width="1.5"/>

  <!-- NORTH - Spade -->
  <g transform="translate(196, 60)">
    <path d="M60 8 C60 8 8 44 8 80 C8 104 28 116 48 112 C44 128 36 136 20 140 L100 140 C84 136 76 128 72 112 C92 116 112 104 112 80 C112 44 60 8 60 8 Z" class="suit-spade"/>
  </g>

  <!-- EAST - Heart -->
  <g transform="translate(340, 196)">
    <path d="M60 100 C60 100 8 64 8 36 C8 16 24 4 40 4 C52 4 60 12 60 12 C60 12 68 4 80 4 C96 4 112 16 112 36 C112 64 60 100 60 100 Z" class="suit-heart"/>
  </g>

  <!-- SOUTH - Diamond -->
  <g transform="translate(216, 320)">
    <path d="M40 0 L80 56 L40 112 L0 56 Z" class="suit-diamond"/>
  </g>

  <!-- WEST - Club -->
  <g transform="translate(80, 196)">
    <circle cx="60" cy="56" r="28" class="suit-club"/>
    <circle cx="28" cy="80" r="24" class="suit-club"/>
    <circle cx="92" cy="80" r="24" class="suit-club"/>
    <rect x="48" y="88" width="24" height="32" class="suit-club" rx="2"/>
    <rect x="28" y="116" width="64" height="12" class="suit-club" rx="6"/>
  </g>

  <!-- Center circle -->
  <circle cx="256" cy="256" r="52" fill="#2c3e50"/>
  <circle cx="256" cy="256" r="44" fill="#f5f0e8"/>

  <!-- NESW compass labels -->
  <text x="256" y="244" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2c3e50">N</text>
  <text x="256" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2c3e50">S</text>
  <text x="276" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2c3e50">E</text>
  <text x="236" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2c3e50">W</text>
</svg>
